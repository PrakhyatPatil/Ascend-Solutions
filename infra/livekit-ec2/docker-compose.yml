services:
  livekit:
    image: livekit/livekit-server:v1.8
    container_name: navable-livekit
    command: ["--config", "/etc/livekit/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    restart: unless-stopped

  agent-bridge:
    build:
      context: ../../backend/livekit-agent-bridge
      dockerfile: Dockerfile
    container_name: navable-agent-bridge
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    restart: unless-stopped
